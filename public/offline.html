<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risment — Offline</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a0a2e 0%, #2d1150 30%, #3b1566 50%, #2d1150 70%, #1a0a2e 100%);
      color: #ffffff;
      padding: 20px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(203, 79, 228, 0.15) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(203, 79, 228, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      text-align: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 48px 36px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 28px;
      background: linear-gradient(135deg, #CB4FE4, #9b30c9);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -1px;
      box-shadow: 0 4px 20px rgba(203, 79, 228, 0.4);
    }

    .offline-icon {
      margin-bottom: 24px;
    }

    .offline-icon svg {
      width: 64px;
      height: 64px;
      opacity: 0.6;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 36px;
      background: linear-gradient(135deg, #CB4FE4, #a33bc4);
      color: #ffffff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(203, 79, 228, 0.35);
      letter-spacing: 0.01em;
    }

    .retry-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(203, 79, 228, 0.5);
    }

    .retry-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(203, 79, 228, 0.3);
    }

    .retry-btn svg {
      width: 18px;
      height: 18px;
    }

    .brand-name {
      margin-top: 32px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.3);
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    @media (max-width: 480px) {
      .card {
        padding: 36px 24px;
        border-radius: 20px;
      }

      .title {
        font-size: 20px;
      }

      .subtitle {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">R</div>

      <div class="offline-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="1" y1="1" x2="23" y2="23"></line>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
          <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
      </div>

      <h1 class="title" id="title"></h1>
      <p class="subtitle" id="subtitle"></p>

      <button class="retry-btn" onclick="window.location.reload()" id="retryBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        <span id="retryText"></span>
      </button>

      <div class="brand-name">RISMENT</div>
    </div>
  </div>

  <script>
    (function () {
      var locale;
      try {
        locale = localStorage.getItem('locale');
      } catch (e) {
        locale = null;
      }
      if (!locale || ['ru', 'uz', 'en'].indexOf(locale) === -1) {
        locale = 'ru';
      }

      var messages = {
        ru: {
          title: 'Нет подключения к интернету',
          subtitle: 'Проверьте соединение и попробуйте снова. Ранее посещённые страницы могут быть доступны из кэша.',
          retry: 'Повторить',
        },
        uz: {
          title: "Internetga ulanish yo'q",
          subtitle: "Aloqani tekshiring va qaytadan urinib ko'ring. Oldin ko'rilgan sahifalar keshdan mavjud bo'lishi mumkin.",
          retry: 'Qayta urinish',
        },
        en: {
          title: 'No internet connection',
          subtitle: 'Check your connection and try again. Previously visited pages may be available from cache.',
          retry: 'Retry',
        },
      };

      var m = messages[locale];
      document.getElementById('title').textContent = m.title;
      document.getElementById('subtitle').textContent = m.subtitle;
      document.getElementById('retryText').textContent = m.retry;
      document.documentElement.lang = locale;
    })();
  </script>
</body>
</html>
